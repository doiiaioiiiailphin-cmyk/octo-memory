<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 - Octo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .info {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 3px solid #4a9eff;
            border-radius: 8px;
            background: #0f0f1a;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
        }
        #score {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a9eff;
        }
        #highScore {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1rem;
            color: #ff6b6b;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
        }
        #overlay.hidden {
            display: none;
        }
        #overlay h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        #overlay p {
            margin-bottom: 20px;
            color: #aaa;
        }
        #startBtn, #restartBtn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #4a9eff, #0066cc);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #startBtn:hover, #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(74, 158, 255, 0.5);
        }
        .controls {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #666;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }
        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            background: #2a2a4a;
            color: #fff;
            cursor: pointer;
        }
        .mobile-controls button:active {
            background: #4a9eff;
        }
        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
            }
            #upBtn { grid-column: 2; grid-row: 1; }
            #leftBtn { grid-column: 1; grid-row: 2; }
            #downBtn { grid-column: 2; grid-row: 2; }
            #rightBtn { grid-column: 3; grid-row: 2; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <p class="info">By Octo 🐙</p>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="score">分数: 0</div>
        <div id="highScore">最高: 0</div>
        
        <div id="overlay">
            <h2>🎮 贪吃蛇</h2>
            <p>吃掉食物，不断成长！</p>
            <button id="startBtn">开始游戏</button>
        </div>
    </div>
    
    <p class="controls">方向键 / WASD 控制移动</p>
    
    <div class="mobile-controls">
        <button id="upBtn">⬆️</button>
        <button id="leftBtn">⬅️</button>
        <button id="downBtn">⬇️</button>
        <button id="rightBtn">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isPlaying = false;

        highScoreDisplay.textContent = `最高: ${highScore}`;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            scoreDisplay.textContent = `分数: ${score}`;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物光晕
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    // 蛇头
                    gradient.addColorStop(0, '#6bcfff');
                    gradient.addColorStop(1, '#4a9eff');
                } else {
                    // 蛇身
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(74, 158, 255, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 102, 204, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = 5;
                    const eyeSize = 3;
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 穿墙
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // 撞到自己
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = `分数: ${score}`;
                spawnFood();
                
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(() => {
                        update();
                        draw();
                    }, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = `最高: ${highScore}`;
            }

            overlay.innerHTML = `
                <h2>💀 游戏结束</h2>
                <p>得分: ${score}</p>
                ${score >= highScore ? '<p style="color: #4a9eff;">🎉 新纪录！</p>' : ''}
                <button id="restartBtn">再来一局</button>
            `;
            overlay.classList.remove('hidden');
            
            document.getElementById('restartBtn').addEventListener('click', startGame);
        }

        function startGame() {
            overlay.classList.add('hidden');
            initGame();
            isPlaying = true;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, gameSpeed);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // 移动端控制
        document.getElementById('upBtn')?.addEventListener('click', () => {
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        });
        document.getElementById('downBtn')?.addEventListener('click', () => {
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        });
        document.getElementById('leftBtn')?.addEventListener('click', () => {
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        });
        document.getElementById('rightBtn')?.addEventListener('click', () => {
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        });

        startBtn.addEventListener('click', startGame);
        
        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
